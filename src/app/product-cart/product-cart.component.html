<div
  *ngIf="product.title"
  class="card products__display-box"
  style="width: 15rem"
>
  <a [routerLink]="['/products', product.$key]">
    <img
      *ngIf="product.imageUrl"
      class="card-img-top / products__image"
      [src]="product.imageUrl"
      alt="{{ product.title }}"
    />
  </a>
  <div class="card-block">
    <h4 class="card-title / products__title">
      <a [routerLink]="['/products', product.$key]">{{ product.title }}</a>
    </h4>

    <div class="products__model-number" *ngIf="product.modelNumber">
      Model: {{ product.modelNumber }}
    </div>

    <div class="products__rating" *ngIf="product.rating != null">
      <div class="products__stars" aria-label="Rating">
        <i
          *ngFor="let s of stars; let si = index"
          [ngClass]="getStarIconClass(product.rating, s)"
        ></i>
      </div>
      <div class="products__rating-count">
        {{ product.rating | number : "1.1-1" }} ({{
        product.ratingCount }})
      </div>
    </div>

    <p class="card-text / products__price">
      <ng-container *ngIf="hasDiscount(product); else normalPrice">
        <span class="products__discount-price">
          {{ product.discountPrice | shopCurrency }}
        </span>
        <span class="products__original-price">
          {{ product.price | shopCurrency }}
        </span>
        <span class="products__save-badge">
          Save {{ product.discountPercent }}%
        </span>
      </ng-container>
      <ng-template #normalPrice>
        {{ product.price | shopCurrency }}
      </ng-template>
    </p>
  </div>
  <div
    class="card-footer / products__add-to-cart"
    *ngIf="showActions && shoppingCart"
  >
    <button
      *ngIf="shoppingCart.getQuantity(product) === 0; else updateQuantity"
      (click)="addToCart()"
      class="btn btn-secondary btn-block products__add-to-cart-cta"
    >
      Add to Cart
    </button>
    <ng-template #updateQuantity>
      <product-quantity [product]="product" [shopping-cart]="shoppingCart">
      </product-quantity>
    </ng-template>
  </div>
</div>
