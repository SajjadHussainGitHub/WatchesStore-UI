<div class="container my-orders py-4 py-md-5">
  <header class="mb-4">
    <h1 class="my-orders__title">My orders</h1>
    <p class="text-muted mb-0">Track your recent purchases and order references.</p>
  </header>

  <div *ngIf="orders.length; else noOrders" class="table-responsive my-orders__table-wrap">
    <table class="table my-orders__table">
      <thead>
        <tr>
          <th>Order</th>
          <th>Date</th>
          <th class="text-right">Total</th>
          <th>Status</th>
          <th class="text-right">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of orders">
          <td>
            <span class="font-weight-bold">{{ o.$key }}</span>
            <span class="d-block small text-muted" *ngIf="o.shippingAddress?.fullName">{{
              o.shippingAddress.fullName
            }}</span>
          </td>
          <td>{{ formatDate(o.datePlaced) }}</td>
          <td class="text-right font-weight-semibold">{{ o.total | shopCurrency }}</td>
          <td>
            <span class="badge badge-pill my-orders__badge" *ngIf="o.paymentStatus === 'paid'">Paid</span>
            <span class="badge badge-pill badge-secondary" *ngIf="o.paymentStatus === 'pay_on_delivery'">COD</span>
            <span class="badge badge-pill badge-warning text-dark" *ngIf="o.paymentStatus === 'pending_online'">Payment due</span>
            <a
              *ngIf="o.paymentStatus === 'pending_online' && o.paymentMethod === 'card'"
              [routerLink]="['/payment', o.$key]"
              class="btn btn-sm btn-outline-dark ml-2"
              >Pay</a
            >
          </td>
          <td class="text-right">
            <button
              type="button"
              class="btn btn-sm btn-outline-danger"
              (click)="deleteOrder(o)"
              [disabled]="deleting.has(o.$key)"
            >
              <span *ngIf="!deleting.has(o.$key)">Delete</span>
              <span *ngIf="deleting.has(o.$key)">Deleting…</span>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="deleteError" class="alert alert-danger m-3">{{ deleteError }}</div>
  </div>

  <ng-template #noOrders>
    <div class="my-orders__empty card border-0 shadow-sm text-center p-5">
      <p class="text-muted mb-3">You don’t have any orders yet.</p>
      <a routerLink="/products" class="btn btn-dark">Browse watches</a>
    </div>
  </ng-template>
</div>
