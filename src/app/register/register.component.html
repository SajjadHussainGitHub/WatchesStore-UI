<div class="auth-page">
  <div class="container">
    <div class="auth-shell">
      <div class="auth-left">
        <div class="auth-badge">Create Account</div>
        <h1>Join Watches Store</h1>
        <p class="auth-subtitle">
          Register once, enjoy faster checkout and better recommendations.
        </p>

        <ul class="auth-features">
          <li><i class="fa fa-user-plus"></i> Profile & order history</li>
          <li><i class="fa fa-shield"></i> Protected local session</li>
          <li><i class="fa fa-star"></i> Premium brand access</li>
        </ul>
      </div>

      <div class="auth-right">
        <div class="auth-card">
          <h2 class="mb-3">New customer registration</h2>

          <form #f="ngForm" (ngSubmit)="register()">
            <div class="form-group">
              <label>Full name</label>
              <input
                type="text"
                class="form-control"
                name="name"
                [(ngModel)]="name"
                required
              />
            </div>

            <div class="form-group mt-3">
              <label>Email</label>
              <input
                type="email"
                class="form-control"
                name="email"
                [(ngModel)]="email"
                required
                email
              />
            </div>

            <div class="form-group mt-3">
              <label>Password</label>
              <div class="input-group">
                <input
                  class="form-control"
                  name="password"
                  [(ngModel)]="password"
                  [type]="showPassword ? 'text' : 'password'"
                  required
                  minlength="6"
                />
                <div class="input-group-append">
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    (click)="showPassword = !showPassword"
                  >
                    {{ showPassword ? 'Hide' : 'Show' }}
                  </button>
                </div>
              </div>
              <small class="text-muted d-block mt-2">
                Use at least 6 characters.
              </small>
            </div>

            <div class="form-group mt-3">
              <label>Confirm password</label>
              <input
                class="form-control"
                name="confirmPassword"
                [(ngModel)]="confirmPassword"
                [type]="showPassword ? 'text' : 'password'"
                required
              />
            </div>

            <div class="form-group mt-3">
              <label class="d-flex align-items-center gap-2">
                <input
                  type="checkbox"
                  [(ngModel)]="acceptTerms"
                  name="acceptTerms"
                />
                <span>I agree to the Terms and Privacy Policy</span>
              </label>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger mt-3">
              {{ errorMessage }}
            </div>

            <button
              type="submit"
              class="btn btn-dark btn-block mt-3"
              [disabled]="loading"
            >
              <span *ngIf="!loading">Create account</span>
              <span *ngIf="loading">Creating...</span>
            </button>

            <div class="auth-footer mt-3">
              <span>Already have an account?</span>
              <a routerLink="/login">Sign in</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
